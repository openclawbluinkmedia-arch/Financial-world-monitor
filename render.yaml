services:
  - type: web
    name: fios-backend
    runtime: python
    repo: https://github.com/openclawbluinkmedia-arch/Financial-world-monitor
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/health
    envVars:
      - key: DEPLOYMENT_MODE
        value: dev
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL_SLUG
        value: qwen/qwen3.5-397b-a17b
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL_SLUG
        value: qwen/qwen3.7-plus
      - key: EMBEDDING_MODEL
        value: nvidia/nv-embedqa-e5-v5
      - key: EMBEDDING_DIM
        value: "1024"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: require
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: INGEST_TOKEN
        sync: false
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: STRUCTURED_LOG
        value: "true"
